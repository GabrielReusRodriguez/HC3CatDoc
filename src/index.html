<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor del catálogo de documentos HC3 de Catsalut</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Visor del catálogo de documentos HC3 de Catsalut</h1>
        <div class="controls">
            <div class="control-group">
                <label for="fileInput">Seleccionar archivo Excel:</label>
                <input type="file" id="fileInput" accept=".xlsx">
            </div>
            <div class="control-group">
                <label for="searchInput">Buscar:</label>
                <input type="text" id="searchInput" placeholder="Buscar...">
            </div>
            <div class="control-group">
                <label for="rowsPerPage">Filas por página:</label>
                <select id="rowsPerPage">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Codi tipus document</th>
                        <th onclick="sortTable(1)">Nom tipus document</th>
                        <th onclick="sortTable(2)">Agrupador</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div class="pagination">
            <button id="prevPage" onclick="previousPage()">Anterior</button>
            <span id="pageInfo">Página 1 de 1</span>
            <button id="nextPage" onclick="nextPage()">Siguiente</button>
        </div>
        <footer>
            <p>Made in Gabriel with love and Mistral Vibe</p>
        </footer>
    </div>
    <script src="xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
